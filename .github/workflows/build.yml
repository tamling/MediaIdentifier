name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Core tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift tests
        run: swift test

  app:
    name: Build .app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project MediaIdentifier.xcodeproj \
            -scheme MediaIdentifier \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
      - name: Package .app
        run: |
          APP=$(find build/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
          echo "Built: $APP"
          ditto -c -k --keepParent "$APP" MediaIdentifier.app.zip
      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaIdentifier-app
          path: MediaIdentifier.app.zip
          if-no-files-found: error
