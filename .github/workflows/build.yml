name: Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Core tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run Swift tests
        run: swift test

  app:
    name: Build .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project Mediafin.xcodeproj \
            -scheme Mediafin \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
      - name: Package .app
        run: |
          APP=$(find build/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
          echo "Built: $APP"
          ARCHS_OUT=$(lipo -archs "$APP/Contents/MacOS/Mediafin")
          echo "Architectures: $ARCHS_OUT"
          case "$ARCHS_OUT" in
            *arm64*x86_64*|*x86_64*arm64*) echo "Universal binary OK." ;;
            *) echo "::error::Expected a universal binary but got: $ARCHS_OUT"; exit 1 ;;
          esac
          # Ad-hoc sign so the unsigned universal app is not rejected as "damaged".
          codesign --force --deep --sign - "$APP"
          ditto -c -k --keepParent "$APP" Mediafin.app.zip
      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mediafin-app
          path: Mediafin.app.zip
          if-no-files-found: error
