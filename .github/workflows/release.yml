name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project MediaIdentifier.xcodeproj \
            -scheme MediaIdentifier \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
      - name: Package & sign .app
        env:
          # Set these as repository secrets to get a Developer ID-signed,
          # notarised build. If DEVELOPER_ID_P12_BASE64 is empty, the workflow
          # falls back to an ad-hoc signature (works locally after removing the
          # quarantine flag). See docs/SIGNING.md.
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          DEVELOPER_ID_NAME: ${{ secrets.DEVELOPER_ID_NAME }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          APP=$(find build/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
          echo "Built: $APP"
          ARCHS_OUT=$(lipo -archs "$APP/Contents/MacOS/MediaIdentifier")
          echo "Architectures: $ARCHS_OUT"
          # Fail loudly rather than ship a single-arch build by accident.
          case "$ARCHS_OUT" in
            *arm64*x86_64*|*x86_64*arm64*) echo "Universal binary OK." ;;
            *) echo "::error::Expected a universal binary but got: $ARCHS_OUT"; exit 1 ;;
          esac

          if [ -z "${DEVELOPER_ID_P12_BASE64}" ]; then
            echo "No signing secrets set → ad-hoc signature."
            codesign --force --deep --sign - "$APP"
            ditto -c -k --keepParent "$APP" MediaIdentifier.app.zip
            exit 0
          fi

          echo "Signing secrets present → Developer ID signing + notarisation."
          # Import the certificate into a temporary keychain.
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null

          # Sign with Hardened Runtime + secure timestamp (required for notarisation).
          codesign --force --deep --options runtime --timestamp \
            --sign "$DEVELOPER_ID_NAME" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          # Notarise the zipped app, then staple the ticket so it works offline.
          ditto -c -k --keepParent "$APP" MediaIdentifier.app.zip
          xcrun notarytool submit MediaIdentifier.app.zip \
            --apple-id "$NOTARY_APPLE_ID" --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" --wait
          xcrun stapler staple "$APP"
          # Re-zip so the published archive contains the stapled ticket.
          ditto -c -k --keepParent "$APP" MediaIdentifier.app.zip
          security delete-keychain "$KEYCHAIN" || true
      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (Universal — Apple Silicon & Intel)
          prerelease: true
          files: MediaIdentifier.app.zip
