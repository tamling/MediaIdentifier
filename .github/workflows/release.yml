name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project MediaIdentifier.xcodeproj \
            -scheme MediaIdentifier \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
      - name: Package .app
        run: |
          APP=$(find build/Build/Products/Release -maxdepth 1 -name '*.app' | head -1)
          echo "Built: $APP"
          ditto -c -k --keepParent "$APP" MediaIdentifier.app.zip
      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: MediaIdentifier.app.zip
