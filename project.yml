# XcodeGen spec. Run `xcodegen generate` to produce MediaIdentifier.xcodeproj,
# which builds a proper macOS .app bundle (Apple Silicon).
#
#   brew install xcodegen
#   xcodegen generate
#   open MediaIdentifier.xcodeproj
#
# The app target compiles Sources/MediaIdentifierApp and links the
# MediaIdentifierCore library product from the local Swift package.
name: MediaIdentifier
options:
  bundleIdPrefix: com.mediaidentifier
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  MediaIdentifierCore:
    path: .

targets:
  MediaIdentifier:
    type: application
    platform: macOS
    sources:
      - path: Sources/MediaIdentifierApp
    info:
      path: MediaIdentifier-Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: ""
        # Allow plaintext HTTP only to local/LAN hosts (link-local, .local and
        # IP literals) so the Jellyfin connector can reach a local server.
        # Public endpoints such as TMDb still require HTTPS.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - package: MediaIdentifierCore
        product: MediaIdentifierCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mediaidentifier.app
        PRODUCT_NAME: MediaIdentifier
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        ARCHS: arm64
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Hardened Runtime improves the security posture (required for
        # notarisation). App Sandbox stays off because the app renames media
        # anywhere the user points it; enabling it would require security-scoped
        # bookmarks for every chosen location.
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
